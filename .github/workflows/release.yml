name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.1.0)'
        required: true
        default: '0.0.0-dev'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build IconBrew.app
        run: ./Scripts/build-app.sh "${{ steps.version.outputs.version }}"

      - name: Zip app bundle
        run: |
          cd build
          ditto -c -k --sequesterRsrc --keepParent IconBrew.app IconBrew.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: IconBrew-${{ steps.version.outputs.version }}
          path: build/IconBrew.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/IconBrew.zip
          generate_release_notes: true
